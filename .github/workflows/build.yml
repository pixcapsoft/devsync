name: Build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Run build script
        run: echo. | build.bat
        shell: cmd
        
      - name: Create Zip Archive
        run: Compress-Archive -Path dist\* -DestinationPath DevSync-release.zip
        
      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: DevSync-release.zip
